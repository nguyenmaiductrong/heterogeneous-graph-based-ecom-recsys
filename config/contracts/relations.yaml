version: "1.0"
name: relations
owner: team-data
description: >
  Edge types (relations) in the heterogeneous graph.
  Includes user-product behavior edges and product-category/brand structural edges.

relation_types:
  # --- User-Product behavior edges ---
  - src: user
    edge: view
    dst: product
    description: User viewed a product

  - src: user
    edge: cart
    dst: product
    description: User added product to cart

  - src: user
    edge: purchase
    dst: product
    description: User purchased a product (target relation)

  # --- Reverse behavior edges ---
  - src: product
    edge: rev_view
    dst: user
    description: Reverse of view edge (for message passing)

  - src: product
    edge: rev_cart
    dst: user
    description: Reverse of cart edge (for message passing)

  - src: product
    edge: rev_purchase
    dst: user
    description: Reverse of purchase edge (for message passing)

  # --- Product-Category structural edges ---
  - src: product
    edge: belongs_to
    dst: category
    description: Product belongs to a category

  - src: category
    edge: contains
    dst: product
    description: Category contains a product (reverse of belongs_to)

  # --- Product-Brand structural edges ---
  - src: product
    edge: has_brand
    dst: brand
    description: Product is manufactured by a brand

  - src: brand
    edge: brands
    dst: product
    description: Brand produces a product (reverse of has_brand)

schema:
  - name: src_id
    type: string
    nullable: false
    description: Source node ID

  - name: dst_id
    type: string
    nullable: false
    description: Destination node ID

  - name: edge_type
    type: string
    nullable: false
    description: Type of relation

  - name: behavior_origin
    type: integer
    nullable: true
    enum: [0, 1, 2]
    description: Behavior origin for user-product edges (view=0, cart=1, purchase=2). Null for structural edges.

quality:
  - rule: src_id is not null
  - rule: dst_id is not null
  - rule: edge_type is not null
  - rule: edge_index shape must be (2, num_edges)
  - rule: behavior_origin must be in [0, 1, 2] for user-product edges