data:
  data_dir:  /content/data/
  node_counts:
    brand: 1919
    category: 14
    product: 29892
    user: 203063
  struct_dir: /content/data/node_mappings

model:
  dropout: 0.2
  embed_dim: 128
  n_layers: 2
  rank: 32
  use_grad_checkpoint: false
  n_intents: 32
  n_freqs: 16
  tau: 5.0   

sampler:
  hop1_budget: 8      
  hop2_budget: 3        
  hop1_sample_replace: false

training:
  amp: true
  use_bf16: true
  batch_size: 32768    
  device: cuda
  epochs: 40
  eval_batch_size: 8192
  eval_every: 1
  eval_subsample: 10000
  eval_seed: 42
  l2_lambda: 1.0e-05
  lr: 0.001     
  max_grad_norm: 1.0
  cl_weight: 0.2   
  cl_g_weight: 1.0e-5
  max_view_triplets: 2000000  
  num_neg: 16     
  num_workers: 8
  patience: 6
  save_dir: checkpoints-v2
  weight_decay: 1.0e-03
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  warmup_epochs: 2
  min_lr: 1.0e-5
  gradient_accumulation: 1

evaluation:
  full_ranking: true
  primary_metric: "NDCG@20"
  ks: [10, 20, 50]
  metrics: ["HR@10", "HR@20", "HR@50", "NDCG@10", "NDCG@20", "NDCG@50"]

hierarchy_cl:
  enabled: true
  tau: 0.1              # Standard temperature
  hard_k: 32            # 32 hard negatives đủ cho 8192 batch
  min_pair_overlap: 16  
  pair_weights:
    - ["view", "cart", 0.2]       # View noisy (15% convert)
    - ["cart", "purchase", 1.0]   # Cart->Purchase 74% - quan trọng nhất!
    - ["view", "purchase", 0.3]   # View->Purchase chỉ 12.5%

wandb:
  artifact_name: bpatmp-checkpoint-v2
  enabled: true
  entity: nguyenmaiductrong37-h-c-vi-n-c-ng-ngh-b-u-ch-nh-vi-n-th-ng
  project: bpatmp-recsys
  run_name: bpatmp-v2
  save_every: 1

a100:
  allow_tf32: true
  cudnn_benchmark: true
  use_fused_adamw: true
  compile_model: true  
  empty_cache_freq: 10  