data:
  data_dir:  /content/data/
  node_counts:
    brand: 1919
    category: 14
    product: 29892
    user: 203063
  struct_dir: /content/data/node_mappings

model:
  dropout: 0.15
  embed_dim: 192
  n_layers: 3
  rank: 48
  use_grad_checkpoint: true
  n_intents: 48
  n_freqs: 24
  tau: 5.0

sampler:
  hop1_budget: 8
  hop2_budget: 3
  hop1_sample_replace: false

training:
  amp: true
  use_bf16: true
  batch_size: 65536
  device: cuda
  epochs: 8
  eval_batch_size: 16384
  eval_every: 2
  eval_subsample: 0.3
  eval_seed: 42
  l2_lambda: 5.0e-06
  lr: 0.0012
  max_grad_norm: 1.0
  cl_weight: 0.15
  cl_g_weight: 1.0e-5
  max_view_triplets: -1
  num_neg: 4
  num_workers: 8
  patience: 4
  save_dir: checkpoints-v2
  weight_decay: 5.0e-04
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  warmup_epochs: 1
  min_lr: 1.0e-6
  gradient_accumulation: 1

evaluation:
  full_ranking: true
  primary_metric: "NDCG@20"
  ks: [10, 20, 50]
  metrics: ["HR@10", "HR@20", "HR@50", "NDCG@10", "NDCG@20", "NDCG@50"]

hierarchy_cl:
  enabled: true
  tau: 0.07
  hard_k: 48
  min_pair_overlap: 8
  pair_weights:
    - ["view", "cart", 0.15]
    - ["cart", "purchase", 1.0]
    - ["view", "purchase", 0.25]

wandb:
  artifact_name: bpatmp-checkpoint-v2
  enabled: true
  entity: nguyenmaiductrong37-h-c-vi-n-c-ng-ngh-b-u-ch-nh-vi-n-th-ng
  project: bpatmp-recsys
  run_name: bpatmp-v2-a100-80gb
  save_every: 1

a100:
  allow_tf32: true
  cudnn_benchmark: true
  use_fused_adamw: true
  compile_model: false
  empty_cache_freq: 50
