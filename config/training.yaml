data:
  data_dir: /content/data/
  node_counts:
    brand: 1919
    category: 14
    product: 29892
    user: 203063
  struct_dir: /content/data/node_mappings

model:
  dropout: 0.2
  embed_dim: 256
  n_layers: 3
  rank: 64
  use_grad_checkpoint: false
  n_intents: 64

sampler:
  hop1_budget: 16
  hop2_budget: 8
  hop1_sample_replace: true

# v7 — controlled experiment: clone v3 (best) and set lambda_cl = 0.
# Mục tiêu: phân biệt CL hại / trung tính / có ích. Single-variable change.
loss:
  lambda_cl: 0.0          # 0.15 -> 0.0  (TẮT CL — biến độc lập duy nhất so với v3)
  lambda_conv: 0.1        # giữ v3
  lambda_mono: 0.05       # giữ v3
  funnel_margin: 0.1
  alpha: 0.5              # giữ v3
  w_min: 0.05

hierarchy_cl:
  enabled: false          # tắt hoàn toàn để khỏi compute uổng
  tau: 0.1
  hard_k: 64
  min_pair_overlap: 4
  pair_weights: null

training:
  amp: true
  use_bf16: true
  batch_size: 8192
  device: cuda
  epochs: 20              # v7 chỉ cần 15-20 epoch để biết peak; rút từ 40 cho nhanh
  eval_batch_size: 8192
  eval_every: 1
  eval_subsample: 60000   # 20000 -> 60000 (giảm noise đo, ~30% val users)
  eval_seed: 42
  l2_lambda: 1.0e-05
  lr: 8.0e-04             # giữ v3
  min_lr: 1.0e-06
  warmup_epochs: 3        # giữ v3
  max_grad_norm: 1.0
  cl_every_k: 2
  max_view_triplets: 3000000   # giữ v3
  num_neg: 32             # giữ v3
  num_workers: 8
  patience: 12            # 10 -> 12 (cho phép quan sát peak muộn hơn nếu có)
  save_dir: checkpoints-v7
  weight_decay: 1.0e-02
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

evaluation:
  full_ranking: true
  primary_metric: "NDCG@20"
  ks: [10, 20, 50]
  metrics: ["HR@10", "HR@20", "HR@50", "NDCG@10", "NDCG@20", "NDCG@50"]

wandb:
  artifact_name: bpatmp-checkpoint-v7
  enabled: true
  entity: nguyenmaiductrong37-h-c-vi-n-c-ng-ngh-b-u-ch-nh-vi-n-th-ng
  project: bpatmp-recsys
  run_name: bpatmp-v7
  save_every: 1

a100:
  allow_tf32: true
  cudnn_benchmark: true
  use_fused_adamw: true
  compile_model: false
  empty_cache_freq: 0
