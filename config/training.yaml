data:
  data_dir:  /content/data/
  node_counts:
    brand: 1919
    category: 14
    product: 29892
    user: 203063
  struct_dir: /content/data/node_mappings

model:
  dropout: 0.2
  embed_dim: 128
  n_layers: 2
  rank: 32
  use_grad_checkpoint: false
  n_intents: 32

sampler:
  hop1_budget: 8
  hop2_budget: 4
  hop1_sample_replace: true

training:
  amp: true
  use_bf16: true
  batch_size: 8192
  device: cuda
  epochs: 30
  eval_batch_size: 8192
  eval_every: 1
  eval_subsample: 10000   # 0 = full eval mỗi epoch
  eval_seed: 42
  l2_lambda: 1.0e-06
  lr: 0.0003
  max_grad_norm: 1.0
  cl_weight: 0.3
  cl_g_weight: 1.0e-5
  max_view_triplets: 4000000
  num_neg: 8
  num_workers: 8
  patience: 5
  save_dir: checkpoints-v1
  weight_decay: 1.0e-03
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

# Đồng bộ với spark_config evaluation và TemporalSplitEvaluator (HR@K, NDCG@K).
evaluation:
  full_ranking: true
  primary_metric: "NDCG@20"
  ks: [10, 20, 50]
  metrics: ["HR@10", "HR@20", "HR@50", "NDCG@10", "NDCG@20", "NDCG@50"]

wandb:
  artifact_name: bpatmp-checkpoint-v1
  enabled: true
  entity: nguyenmaiductrong37-h-c-vi-n-c-ng-ngh-b-u-ch-nh-vi-n-th-ng
  project: bpatmp-recsys
  run_name: bpatmp-v1
  save_every: 1

# A100 optimizations
a100:
  allow_tf32: true
  cudnn_benchmark: true
  use_fused_adamw: true
  compile_model: false
  empty_cache_freq: 0