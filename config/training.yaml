data:
  data_dir: /content/data/
  node_counts:
    brand: 1919
    category: 14
    product: 29892
    user: 203063
  struct_dir: /content/data/node_mappings

model:
  dropout: 0.3
  embed_dim: 256
  n_layers: 3
  rank: 64
  use_grad_checkpoint: false
  n_intents: 64

sampler:
  hop1_budget: 16
  hop2_budget: 8
  hop1_sample_replace: true

loss:
  lambda_cl: 0.1
  lambda_conv: 0.02
  lambda_mono: 0.0
  funnel_margin: 0.1
  alpha: 0.5
  w_min: 0.05

hierarchy_cl:
  enabled: true
  tau: 0.1
  hard_k: 64
  min_pair_overlap: 4
  pair_weights: null

training:
  amp: true
  use_bf16: true
  batch_size: 8192
  device: cuda
  epochs: 30
  eval_batch_size: 8192
  eval_every: 1
  eval_subsample: 60000
  eval_seed: 42
  l2_lambda: 1.0e-05
  lr: 3.0e-04
  min_lr: 5.0e-06
  warmup_epochs: 4
  max_grad_norm: 1.0
  cl_every_k: 2
  max_view_triplets: 3000000
  num_neg: 64
  num_workers: 8
  patience: 12
  save_dir: checkpoints-v3-runc
  weight_decay: 1.0e-04
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

evaluation:
  full_ranking: true
  primary_metric: "NDCG@20"
  ks: [10, 20, 50]
  metrics: ["HR@10", "HR@20", "HR@50", "NDCG@10", "NDCG@20", "NDCG@50"]

wandb:
  artifact_name: bpatmp-checkpoint-v3-runc
  enabled: true
  entity: nguyenmaiductrong37-h-c-vi-n-c-ng-ngh-b-u-ch-nh-vi-n-th-ng
  project: bpatmp-recsys
  run_name: bpatmp-v3-runc
  save_every: 1

a100:
  allow_tf32: true
  cudnn_benchmark: true
  use_fused_adamw: true
  compile_model: false
  empty_cache_freq: 0

debug:
  enabled: true
  eval_repeats: 1
  eval_seed_stride: 9973
  rerun_eval_on_drop: true
  primary_drop_threshold: 0.005
  log_model_stats: true
