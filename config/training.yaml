data:
  data_dir: /content/data/
  node_counts:
    brand: 1919
    category: 14
    product: 29892
    user: 203063
  struct_dir: /content/data/node_mappings

model:
  dropout: 0.2
  embed_dim: 256
  n_layers: 3
  rank: 32
  use_grad_checkpoint: false
  n_intents: 32

sampler:
  hop1_budget: 8
  hop2_budget: 4
  hop1_sample_replace: true

loss:
  lambda_cl: 0.05
  lambda_conv: 0.0
  lambda_mono: 0.0
  funnel_margin: 0.1
  alpha: 0.5
  w_min: 0.05

hierarchy_cl:
  enabled: true
  tau: 0.1
  hard_k: 32
  min_pair_overlap: 4
  max_users_per_pair: 2048
  pair_weights: null

training:
  amp: true
  use_bf16: true
  batch_size: 4096
  device: cuda
  epochs: 35
  eval_batch_size: 4096
  eval_every: 3
  eval_subsample: 10000
  eval_seed: 42
  l2_lambda: 1.0e-05
  lr: 8.0e-04
  min_lr: 1.0e-06
  warmup_epochs: 2
  max_grad_norm: 1.0
  cl_every_k: 4
  max_view_triplets: 1500000
  num_neg: 32
  hard_neg_candidates: 4096
  neg_history_cap: 256
  num_workers: 8
  patience: 10
  checkpoint_every: 1
  save_dir: checkpoints-v10-fixed
  weight_decay: 1.0e-02
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

evaluation:
  full_ranking: true
  primary_metric: "NDCG@20"
  ks: [10, 20, 50]
  metrics: ["HR@10", "HR@20", "HR@50", "NDCG@10", "NDCG@20", "NDCG@50"]

wandb:
  artifact_name: bpatmp-checkpoint-v10-fixed
  enabled: true
  entity: nguyenmaiductrong37-h-c-vi-n-c-ng-ngh-b-u-ch-nh-vi-n-th-ng
  project: bpatmp-recsys
  run_name: bpatmp-v10-fixed
  save_every: 1
  verify_checkpoints: false

a100:
  allow_tf32: true
  cudnn_benchmark: true
  use_fused_adamw: true
  compile_model: false
  empty_cache_freq: 0
