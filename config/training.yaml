data:
  data_dir: /content/data/
  node_counts:
    brand: 1919
    category: 14
    product: 29892
    user: 203063
  struct_dir: /content/data/node_mappings

model:
  dropout: 0.2
  embed_dim: 256
  n_layers: 3
  rank: 64
  use_grad_checkpoint: false
  n_intents: 64

sampler:
  hop1_budget: 16
  hop2_budget: 8
  hop1_sample_replace: true

# Total loss:
#   L = Σ_b w_b * CE_softmax(s_b(u,i⁺), {s_b(u,i⁻_j)})  +  lambda_emb * mean(‖e_u‖² + ‖e_i⁺‖² + Σ‖e_i⁻‖²)
# Per-behavior weights: w_b = clip((N_purchase / N_b) ** alpha, w_min, 1.0)
loss:
  alpha: 0.5          # exponent in w_b = (N_p / N_b) ** alpha
  w_min: 0.05         # floor for view/cart weight
  temperature: 1.0    # softmax temperature for the CE ranking loss
  lambda_emb: 1.0e-03 # L2 on the user/pos/neg vectors used in scoring

training:
  amp: true
  use_bf16: true
  batch_size: 8192
  device: cuda
  epochs: 30
  eval_batch_size: 8192
  eval_every: 1
  eval_subsample: 20000
  eval_seed: 42
  lr: 3.0e-04
  min_lr: 1.0e-06
  warmup_epochs: 2
  max_grad_norm: 1.0
  max_view_triplets: 3000000
  num_neg: 32
  num_workers: 8
  patience: 10
  save_dir: checkpoints-v4-softmax
  weight_decay: 1.0e-02
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

evaluation:
  full_ranking: true
  primary_metric: "NDCG@20"
  ks: [10, 20, 50]
  metrics: ["HR@10", "HR@20", "HR@50", "NDCG@10", "NDCG@20", "NDCG@50"]

wandb:
  artifact_name: bpatmp-checkpoint-v4-softmax
  enabled: true
  entity: nguyenmaiductrong37-h-c-vi-n-c-ng-ngh-b-u-ch-nh-vi-n-th-ng
  project: bpatmp-recsys
  run_name: bpatmp-v4-softmax
  save_every: 1

a100:
  allow_tf32: true
  cudnn_benchmark: true
  use_fused_adamw: true
  compile_model: false
  empty_cache_freq: 0

debug:
  enabled: true
  eval_repeats: 1
  eval_seed_stride: 9973
  rerun_eval_on_drop: true
  primary_drop_threshold: 0.005
  log_model_stats: true
